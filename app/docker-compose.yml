version: "3.8"

# Why this file exists:
#   Instead of installing Postgres/Redis/Kafka on your machine, Docker gives each
#   service a clean, isolated, reproducible environment. Any team member can run
#   `docker compose up -d` and get the exact same infra you're using.

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  # The source of truth. All confirmed bookings live here permanently.
  # We use 16-alpine (lightweight). The healthcheck matters: Spring Boot will
  # only connect once pg_isready returns success — without it, the app crashes
  # on startup if Postgres isn't ready yet.
  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-postgres
    environment:
      POSTGRES_DB: ticketflow
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: Omganesh2006
    ports:
      - "5499:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketflow -d ticketflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ───────────────────────────────────────────────────────────────────
  # The in-memory reservation layer. Two roles:
  #   1. Seat inventory sets (Phase 2)
  #   2. Distributed locks via Redisson (Phase 5)
  #
  # --notify-keyspace-events Ex: enables "keyevent" notifications for expired keys.
  # Shvet ghare
  # This is how Phase 5's expiration engine works — Redis fires an event when a
  # seat lock TTL expires and our Spring listener catches it.
  redis:
    image: redis:7-alpine
    container_name: ticketflow-redis
    ports:
      - "6379:6379"
    command: redis-server --notify-keyspace-events Ex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Zookeeper ───────────────────────────────────────────────────────────────
  # Kafka uses Zookeeper for broker coordination (leader election, topic metadata).
  # Note: Kafka 4.x replaces Zookeeper with KRaft mode. We use 3.x here because
  # the Confluent image ecosystem is more mature and your Atlas setup uses it too.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ticketflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "5"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Kafka ───────────────────────────────────────────────────────────────────
  # The async buffer. Once Redis confirms a seat is locked, the reservation event
  # goes here. The consumer picks it up and writes to Postgres at its own pace.
  #
  # ADVERTISED_LISTENERS split: your Spring Boot app (on your host) uses
  # localhost:9092. Inter-broker communication (inside Docker network) uses
  # kafka:29092. Without this split, the broker advertises the wrong address and
  # your app can't connect.
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ticketflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Mailpit ─────────────────────────────────────────────────────────────────
  # A local SMTP testing server. Captures all emails sent from the application
  # and shows them in a beautiful web UI at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    container_name: ticketflow-mailpit
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port

volumes:
  pg_data:
    name: ticketflow_pg_data
