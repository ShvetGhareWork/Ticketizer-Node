  webhook:
    secret: rzp_test_placeholder_webhook_secret

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080

# ── Actuator ──────────────────────────────────────────────────────────────────
# Hit /actuator/health to verify all services are connected.
# In Phase 6 we'll hook this into Prometheus metrics.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.ticketflow: DEBUG
    org.springframework.kafka: INFO
    org.flywaydb: INFO
