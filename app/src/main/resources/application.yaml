spring:
  application:
    name: ticketflow

  mail:
    host: smtp.gmail.com
    port: 587
    username: shvetgharework@gmail.com
    password: elfekjuxxiaxidkr
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # ── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketizer
    username: ticketizer_user
    password: ticketizer_password
    driver-class-name: org.postgresql.Driver
    hikari:
      # HikariCP is Spring Boot's default connection pool.
      # maximum-pool-size: how many concurrent DB connections you allow.
      # For Phase 1 dev, 10 is fine. In production, size this to:
      #   (number_of_cores * 2) + effective_spindle_count
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: TicketFlowHikariPool

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # IMPORTANT: ddl-auto: validate means Hibernate checks that the schema
      # matches your entities but NEVER touches the schema itself.
      # Flyway owns the schema. Hibernate just validates.
      # Never use 'create' or 'create-drop' in a real project.
      ddl-auto: update # For Phase 1 dev only. Switch to 'validate' once your schema is stable.
    show-sql: false # Set to true temporarily when debugging a query
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC # Always store timestamps in UTC. Convert to local in the UI.

  # ── Flyway ──────────────────────────────────────────────────────────────────
  # Flyway scans classpath:db/migration for files named V{version}__{description}.sql
  # It runs them in version order and records each run in a 'flyway_schema_history' table.
  # If you add a V2 migration later, Flyway runs only V2 (V1 is already recorded).
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false # Don't auto-baseline — we start fresh

  # ── Redis ────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms # Connection timeout — fail fast rather than hang

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ticketflow-group
      # earliest: read from the beginning of the topic on first startup.
      # latest: only read messages produced after the consumer starts.
      # 'earliest' is safer for booking confirmations — you don't want to miss any.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*" # For JSON deserialization. In production, specify your package for security.
      # CRITICAL: disable auto-commit. We commit manually only AFTER the DB write
      # succeeds (Phase 4). Auto-commit = "I received it" not "I processed it".
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # acks: all → producer waits for ALL in-sync replicas to acknowledge.
      # Combined with enable.idempotence, this guarantees exactly-once delivery.
      acks: all
      retries: 3
      properties:
        # Idempotent producer: Kafka assigns a sequence number to each message.
        # If the network drops and the producer retries, Kafka deduplicates using
        # the sequence number. No duplicate messages even on retry.
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

# ── Razorpay ──────────────────────────────────────────────────────────────────
